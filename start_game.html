<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Web Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        .btn-start {
            background-color: #55ff55;
            color: #000;
            font-size: 32px;
            font-weight: bold;
            padding: 20px 40px;
            border: 4px solid #00aa00;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 8px 0 #005500;
            transition: all 0.1s ease;
            text-transform: uppercase;
        }
        .btn-start:hover {
            background-color: #aaffaa;
        }
        .btn-start:active {
            box-shadow: 0 0 0 #005500;
            transform: translateY(8px);
        }
    </style>
</head>
<body>
    <button class="btn-start" onclick="window.location.href='Minecraft/index.html'">Start Game</button>
</body>
</html>
